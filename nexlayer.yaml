application:
  name: humhub
  pods:
  - name: app
    image: "# filled by pipeline"
    path: /
    servicePorts:
    - 80
  - name: db
    image: mariadb:11
    servicePorts:
    - 3306
    vars:
      MARIADB_DATABASE: humhub
      MARIADB_ROOT_PASSWORD: humhubRootPass2026
    volumes:
    - name: humhub-db-v2
      mountPath: /var/lib/mysql
      size: 5Gi
