application:
  name: humhub
  pods:
  - name: app
    image: humhub/humhub:latest
    path: /
    servicePorts:
    - 80
    vars:
      SERVER_NAME: "http://relaxed-weasel-humhub.cloud.nexlayer.ai"
      HUMHUB_DEBUG: "false"
      HUMHUB_CONFIG__COMPONENTS__DB__DSN: "mysql:host=humhub-mysql.pod;dbname=humhub"
      HUMHUB_CONFIG__COMPONENTS__DB__USERNAME: "humhub"
      HUMHUB_CONFIG__COMPONENTS__DB__PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
    - name: humhub-data
      mountPath: /data
      size: 5Gi
  - name: humhub-mysql
    image: mysql:8
    servicePorts:
    - 3306
    vars:
      MYSQL_DATABASE: humhub
      MYSQL_USER: humhub
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    volumes:
    - name: humhub-db
      mountPath: /var/lib/mysql
      size: 5Gi
