application:
  name: humhub
  pods:
  - name: app
    image: mriedmann/humhub:stable
    path: /
    servicePorts:
    - 80
    vars:
      HUMHUB_DB_HOST: humhub-db-service
      HUMHUB_DB_USER: root
      HUMHUB_DB_PASSWORD: humhubRootPass2026
      HUMHUB_DB_NAME: humhub
      HUMHUB_AUTO_INSTALL: "true"
      HUMHUB_PROTO: https
      HUMHUB_HOST: relaxed-weasel-humhub.cloud.nexlayer.ai
      HUMHUB_ADMIN_LOGIN: admin
      HUMHUB_ADMIN_EMAIL: admin@example.com
      HUMHUB_ADMIN_PASSWORD: NexlayerAdmin2026
      INTEGRITY_CHECK: "0"
      WAIT_FOR_DB: "1"
  - name: db
    image: mariadb:11
    servicePorts:
    - 3306
    vars:
      MARIADB_DATABASE: humhub
      MARIADB_ROOT_PASSWORD: humhubRootPass2026
    volumes:
    - name: humhub-db-v2
      mountPath: /var/lib/mysql
      size: 5Gi
