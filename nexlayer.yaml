application:
  name: humhub
  pods:
  - name: app
    image: mriedmann/humhub:stable
    path: /
    servicePorts:
    - 80
    vars:
      HUMHUB_DB_HOST: humhub-mysql.pod
      HUMHUB_DB_USER: humhub
      HUMHUB_DB_PASSWORD: humhubDbPass2026
      HUMHUB_DB_NAME: humhub
      HUMHUB_AUTO_INSTALL: "true"
      HUMHUB_PROTO: https
      HUMHUB_HOST: relaxed-weasel-humhub.cloud.nexlayer.ai
      HUMHUB_ADMIN_LOGIN: admin
      HUMHUB_ADMIN_EMAIL: admin@example.com
      HUMHUB_ADMIN_PASSWORD: NexlayerAdmin2026
    volumes:
    - name: humhub-uploads
      mountPath: /var/www/localhost/htdocs/uploads
      size: 5Gi
  - name: humhub-mysql
    image: mysql:8
    servicePorts:
    - 3306
    vars:
      MYSQL_DATABASE: humhub
      MYSQL_USER: humhub
      MYSQL_PASSWORD: humhubDbPass2026
      MYSQL_ROOT_PASSWORD: humhubRootPass2026
    volumes:
    - name: humhub-db
      mountPath: /var/lib/mysql
      size: 5Gi
